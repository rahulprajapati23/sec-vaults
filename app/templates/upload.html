{% extends 'base.html' %}
{% block content %}
<section class="panel narrow">
  <h1>Upload file</h1>
  <p>Files are encrypted before they are written to disk.</p>
  <form action="/files/upload" method="post" enctype="multipart/form-data" class="stacked-form">
    <label>File</label>
    <input type="file" name="file" required />
    <label>Expiry hours</label>
    <input type="number" name="expiry_hours" min="1" max="720" value="24" required />
    <label>Download limit</label>
    <input type="number" name="max_downloads" min="1" placeholder="Optional" />
    <button type="submit">Upload and encrypt</button>
  </form>
</section>
{% endblock %}
